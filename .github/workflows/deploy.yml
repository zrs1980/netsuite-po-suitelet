name: Deploy to NetSuite

on:
  push:
    branches: [main]
    paths:
      - 'src/FileCabinet/**/*.js'

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  deploy:
    name: Upload SuiteScripts to NetSuite File Cabinet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy files to NetSuite
        env:
          NS_ACCOUNT_ID:     ${{ secrets.NS_ACCOUNT_ID }}
          NS_CONSUMER_KEY:   ${{ secrets.NS_CONSUMER_KEY }}
          NS_CONSUMER_SECRET: ${{ secrets.NS_CONSUMER_SECRET }}
          NS_TOKEN_ID:       ${{ secrets.NS_TOKEN_ID }}
          NS_TOKEN_SECRET:   ${{ secrets.NS_TOKEN_SECRET }}
          NS_FOLDER_ID:      ${{ secrets.NS_FOLDER_ID }}
        run: node deploy/netsuite-deploy.mjs
